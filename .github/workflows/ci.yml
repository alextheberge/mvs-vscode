name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install mvs-manager (MVSengine releases)
        run: |
          set -euo pipefail
          bin_dir="${{ github.workspace }}/.local/bin"
          install_url="https://raw.githubusercontent.com/alextheberge/MVSengine/master/scripts/install.sh"
          curl -fsSL "$install_url" -o /tmp/mvs-install-mvsengine.sh
          bash /tmp/mvs-install-mvsengine.sh
          "${bin_dir}/mvs-manager" --version
        env:
          MVS_INSTALL_DIR: ${{ github.workspace }}/.local/bin
          MVS_VERSION: latest
      - run: echo "${{ github.workspace }}/.local/bin" >> "$GITHUB_PATH"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run mvs:dogfood-check
      - run: npm run check
      - run: npm run lint
      - run: npm test
      - run: npm run compile
      - run: npm run mvs:lint
      - run: npm run package
      - uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: "*.vsix"
