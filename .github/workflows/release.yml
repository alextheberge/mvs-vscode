name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  vsix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install mvs-manager (MVSengine releases)
        run: |
          set -euo pipefail
          bin_dir="${{ github.workspace }}/.local/bin"
          mkdir -p "$bin_dir"
          api="https://api.github.com/repos/alextheberge/MVSengine/releases/latest"
          tag=$(curl -fsSL -H "Accept: application/vnd.github+json" -H "User-Agent: mvs-vscode-ci" "$api" | python3 -c "import json,sys; print(json.load(sys.stdin)['tag_name'])")
          ver="${tag#v}"
          asset="mvs-manager-${ver}-x86_64-unknown-linux-gnu.tar.gz"
          url="https://github.com/alextheberge/MVSengine/releases/download/${tag}/${asset}"
          tmp=$(mktemp -d)
          trap 'rm -rf "$tmp"' EXIT
          curl -fsSL "$url" -o "$tmp/${asset}"
          tar -xzf "$tmp/${asset}" -C "$tmp"
          cp "$tmp/mvs-manager" "$bin_dir/mvs-manager"
          chmod +x "$bin_dir/mvs-manager"
          "$bin_dir/mvs-manager" --version
      - run: echo "${{ github.workspace }}/.local/bin" >> "$GITHUB_PATH"
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run mvs:dogfood-check
      - run: npm run check
      - run: npm run lint
      - run: npm test
      - run: npm run compile
      - run: npm run mvs:lint
      - run: npm run package
      - name: Verify tag matches package.json version
        if: github.ref_type == 'tag'
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          TAG_VER="${TAG_NAME#v}"
          PKG_VER=$(node -p "require('./package.json').version")
          if [ "$TAG_VER" != "$PKG_VER" ]; then
            echo "Git tag ${TAG_NAME} implies version '${TAG_VER}' but package.json has '${PKG_VER}'."
            echo "Sync versions (npm run mvs:sync-version after regenerating mvs.json), commit, then tag v\${PKG_VER}."
            exit 1
          fi
      - name: Upload VSIX artifact (workflow_dispatch dry run)
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v6
        with:
          name: vsix-release-dryrun
          path: "*.vsix"
      - name: Publish GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v3
        with:
          files: "*.vsix"
          generate_release_notes: true
