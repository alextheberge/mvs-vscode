name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  vsix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install mvs-manager (MVSengine releases)
        run: |
          set -euo pipefail
          bin_dir="${{ github.workspace }}/.local/bin"
          install_url="https://raw.githubusercontent.com/alextheberge/MVSengine/master/scripts/install.sh"
          curl -fsSL "$install_url" -o /tmp/mvs-install-mvsengine.sh
          bash /tmp/mvs-install-mvsengine.sh
          "${bin_dir}/mvs-manager" --version
        env:
          MVS_INSTALL_DIR: ${{ github.workspace }}/.local/bin
          MVS_VERSION: latest
      - run: echo "${{ github.workspace }}/.local/bin" >> "$GITHUB_PATH"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run mvs:dogfood-check
      - run: npm run check
      - run: npm run lint
      - run: npm test
      - run: npm run compile
      - run: npm run mvs:lint
      - run: npm run package
      - name: Verify tag matches package.json version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          TAG_VER="${TAG_NAME#v}"
          PKG_VER=$(node -p "require('./package.json').version")
          if [ "$TAG_VER" != "$PKG_VER" ]; then
            echo "Git tag ${TAG_NAME} implies version '${TAG_VER}' but package.json has '${PKG_VER}'."
            echo "Sync versions (npm run mvs:sync-version after regenerating mvs.json), commit, then tag v\${PKG_VER}."
            exit 1
          fi
      - uses: softprops/action-gh-release@v2
        with:
          files: "*.vsix"
          generate_release_notes: true
